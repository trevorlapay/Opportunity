services:
  opportunity:
    build: .
    restart: always
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      # Persistent state: seen_items.json, sources.json, run_log.json
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
